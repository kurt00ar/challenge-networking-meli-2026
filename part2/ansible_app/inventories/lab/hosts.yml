all:
  vars:
    ansible_python_interpreter: /usr/local/bin/python

  children:
    fortigate:
      hosts:
        fgt:
          # FortiGate target from .env (injected into container)
          ansible_host: "{{ lookup('env','FGT_HOST') }}"
          ansible_user: "{{ lookup('env','FGT_USER') | default('admin', true) }}"
          ansible_password: "{{ lookup('env','FGT_PASS') | default('', true) }}"

          # Fortinet httpapi connection
          ansible_connection: httpapi
          ansible_network_os: fortinet.fortios.fortios
          ansible_httpapi_use_ssl: "{{ (lookup('env','FGT_USE_SSL') | default('false', true)) | bool }}"
          ansible_httpapi_validate_certs: false
          ansible_httpapi_port: "{{ lookup('env','FGT_HTTP_PORT') | default('80', true) }}"

    paloalto:
      hosts:
        panos:
          # Palo Alto target from .env
          ansible_host: "{{ lookup('env','PAN_HOST') }}"
          pan_username: "{{ lookup('env','PAN_USER') | default('admin', true) }}"
          pan_password: "{{ lookup('env','PAN_PASS') | default('', true) }}"

          # Context (used by playbooks)
          pan_wan_interface: "{{ lookup('env','PAN_WAN_IF') | default('ethernet1/3', true) }}"
          pan_virtual_router: "{{ lookup('env','PAN_VR') | default('default', true) }}"
          pan_vsys: "{{ lookup('env','PAN_VSYS') | default('vsys1', true) }}"

          # We execute PAN-OS changes from the container itself via API (connection local)
          ansible_connection: local

          # Port is still used by playbooks/modules
          ansible_httpapi_port: "{{ lookup('env','PAN_HTTPS_PORT') | default('443', true) }}"