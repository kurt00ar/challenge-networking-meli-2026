[defaults]
# --- Core ---
inventory = inventories/lab/hosts.yml
interpreter_python = auto_silent
forks = 20
timeout = 60

# --- Output (FIX: no community.general.yaml) ---
stdout_callback = default
bin_ansible_callbacks = True
display_skipped_hosts = False
display_ok_hosts = True

# Default callback renders in YAML via this option (ansible-core >= 2.13)
result_format = yaml

# --- Clean workspace ---
retry_files_enabled = False
nocows = 1

# --- Reduce noise (for challenge delivery) ---
deprecation_warnings = False
command_warnings = False

# --- SSH behavior ---
host_key_checking = False

# --- Collections path (IMPORTANT: singular) ---
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# --- Optional cache ---
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./.ansible_fact_cache
fact_caching_timeout = 7200

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
control_path = ~/.ssh/ansible-%%r@%%h:%%p